<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rythu Mitra IVR</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#07131f;
display:flex;
justify-content:center;
align-items:flex-start;
gap:25px;
padding:20px;
flex-wrap:wrap;

}

/* ===== PHONE ===== */

.phone{

width:340px;
background:#0d1117;
border-radius:40px;
padding:18px;
box-shadow:0 0 25px rgba(0,0,0,0.5);

}

/* ===== TOP ===== */

.topBar{

display:flex;
justify-content:space-between;
align-items:center;
color:white;
font-size:18px;
margin-bottom:12px;

}

/* ===== SCREEN ===== */

#screen{

height:470px;
background:linear-gradient(
to bottom,
#c9fbff,
#ebffff
);

border-radius:28px;
padding:25px;
overflow:hidden;
position:relative;
text-align:center;

}

/* ===== SCREEN TEXT ===== */

#screenText{

font-size:28px;
font-weight:bold;
color:#123;
line-height:1.5;
margin-top:10px;

}

/* ===== WAVE ===== */

#wave{

width:90px;
height:90px;
border-radius:50%;
background:#00d26a;
margin:auto;
margin-top:25px;
opacity:0;
animation:pulse 1s infinite;

}

@keyframes pulse{

0%{

transform:scale(0.8);
opacity:0.4;

}

50%{

transform:scale(1.1);
opacity:1;

}

100%{

transform:scale(0.8);
opacity:0.4;

}

}

/* ===== KEYPAD ===== */

.keypad{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
margin-top:25px;

}

.keypad button{

height:62px;
border:none;
border-radius:18px;
font-size:28px;
background:#111827;
color:white;
box-shadow:0 4px 10px rgba(0,0,0,0.4);

}

/* ===== CALL BUTTONS ===== */

.callButtons{

display:flex;
justify-content:center;
gap:40px;
margin-top:22px;

}

.callBtn,
.endBtn{

width:78px;
height:78px;
border:none;
border-radius:50%;
font-size:34px;
color:white;

}

.callBtn{

background:#00b140;

}

.endBtn{

background:#ff2b2b;

}

/* ===== SIDE PANEL ===== */

.sidePanel{

width:350px;
display:flex;
flex-direction:column;
gap:20px;

}

/* ===== CARDS ===== */

.card{

background:white;
padding:22px;
border-radius:24px;

}

.card h2{

color:#1f5d39;
font-size:22px;
margin-bottom:18px;

}

/* ===== MESSAGE ===== */

.message{

background:#e9ffd2;
padding:15px;
border-radius:16px;
margin-bottom:14px;
font-size:18px;
line-height:1.5;

}

/* ===== AUDIO ===== */

audio{

width:100%;
margin-top:10px;

}

/* ===== MOBILE ===== */

@media(max-width:800px){

body{

flex-direction:column;
align-items:center;

}

.sidePanel{

width:95%;

}

.phone{

width:95%;

}

}

</style>

</head>

<body>

<!-- ===== PHONE ===== -->

<div class="phone">

<!-- ===== TOP ===== -->

<div class="topBar">

<div>
📶 BSNL Mobile
</div>

<div id="timer">
00:00
</div>

</div>

<!-- ===== SCREEN ===== -->

<div id="screen">

<div id="screenText">

📞 Ready To Call

</div>

<div id="wave"></div>

</div>

<!-- ===== KEYPAD ===== -->

<div class="keypad">

<button onclick="pressKey('1')">1</button>
<button onclick="pressKey('2')">2</button>
<button onclick="pressKey('3')">3</button>

<button onclick="pressKey('4')">4</button>
<button onclick="pressKey('5')">5</button>
<button onclick="pressKey('6')">6</button>

<button onclick="pressKey('7')">7</button>
<button onclick="pressKey('8')">8</button>
<button onclick="pressKey('9')">9</button>

<button>*</button>
<button onclick="pressKey('0')">0</button>
<button>#</button>

</div>

<!-- ===== CALL BUTTONS ===== -->

<div class="callButtons">

<button class="callBtn"
onclick="startCall()">

📞

</button>

<button class="endBtn"
onclick="endCall()">

❌

</button>

</div>

</div>

<!-- ===== SIDE PANEL ===== -->

<div class="sidePanel">

<!-- ===== SMS HISTORY ===== -->

<div class="card">

<h2>
📩 SMS History
</h2>

<div id="smsHistory">

<div class="message">
No SMS Sent Yet
</div>

</div>

</div>

<!-- ===== COMPLAINTS ===== -->

<div class="card">

<h2>
🎤 Complaint Recordings
</h2>

<div id="complaints">

<div class="message">
No Complaint Yet
</div>

</div>

</div>

</div>

<!-- ===== APP JS ===== -->

<script src="app.js"></script>

</body>

</html>
