<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rythu Mitra IVR</title>

<style>

body{

margin:0;
padding:20px;
background:#101820;
font-family:Arial;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;

}

/* ===== PHONE ===== */

.phone{

width:320px;
background:#111;
border-radius:35px;
padding:15px;
box-shadow:0 0 20px black;

}

/* ===== TOP ===== */

.topBar{

display:flex;
justify-content:space-between;
color:white;
font-size:18px;
margin-bottom:10px;

}

/* ===== SCREEN ===== */

#screen{

height:420px;
background:linear-gradient(
to bottom,
#bffcff,
#dfffff
);

border-radius:20px;
padding:20px;
overflow:auto;
text-align:center;
font-size:26px;
font-weight:bold;
color:#123;
position:relative;

}

#screenText{

margin-top:20px;

}

/* ===== WAVE ===== */

#wave{

width:80px;
height:80px;
border-radius:50%;
background:#00cc66;
opacity:0;
margin:auto;
margin-top:20px;
animation:pulse 1s infinite;

}

@keyframes pulse{

0%{

transform:scale(0.8);
opacity:0.5;

}

50%{

transform:scale(1.1);
opacity:1;

}

100%{

transform:scale(0.8);
opacity:0.5;

}

}

/* ===== KEYPAD ===== */

.keypad{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:20px;

}

.keypad button{

height:60px;
font-size:24px;
border:none;
border-radius:15px;
background:#222;
color:white;

}

/* ===== CALL BUTTONS ===== */

.callButtons{

display:flex;
justify-content:center;
gap:30px;
margin-top:20px;

}

.callBtn,
.endBtn{

width:70px;
height:70px;
border:none;
border-radius:50%;
font-size:30px;
color:white;

}

.callBtn{

background:#00aa33;

}

.endBtn{

background:red;

}

/* ===== SIDE PANEL ===== */

.sidePanel{

width:340px;
display:flex;
flex-direction:column;
gap:20px;

}

/* ===== CARD ===== */

.card{

background:white;
padding:20px;
border-radius:20px;

}

.card h2{

margin-top:0;
color:#14532d;

}

/* ===== MESSAGE ===== */

.message{

background:#eaffd0;
padding:15px;
border-radius:15px;
margin-bottom:15px;
font-size:18px;

}

/* ===== AUDIO ===== */

audio{

width:100%;

}

/* ===== MOBILE ===== */

@media(max-width:700px){

body{

flex-direction:column;
align-items:center;

}

.sidePanel{

width:90%;

}

.phone{

width:90%;

}

}

</style>

</head>

<body>

<!-- ===== PHONE ===== -->

<div class="phone">

<!-- ===== TOP BAR ===== -->

<div class="topBar">

<div>
📶 BSNL Mobile
</div>

<div id="timer">
00:00
</div>

</div>

<!-- ===== SCREEN ===== -->

<div id="screen">

<div id="screenText">

📞 Ready To Call

</div>

<div id="wave"></div>

</div>

<!-- ===== KEYPAD ===== -->

<div class="keypad">

<button onclick="pressKey('1')">1</button>
<button onclick="pressKey('2')">2</button>
<button onclick="pressKey('3')">3</button>

<button onclick="pressKey('4')">4</button>
<button onclick="pressKey('5')">5</button>
<button onclick="pressKey('6')">6</button>

<button onclick="pressKey('7')">7</button>
<button onclick="pressKey('8')">8</button>
<button onclick="pressKey('9')">9</button>

<button>*</button>
<button onclick="pressKey('0')">0</button>
<button>#</button>

</div>

<!-- ===== CALL BUTTONS ===== -->

<div class="callButtons">

<button class="callBtn"
onclick="startCall()">

📞

</button>

<button class="endBtn"
onclick="endCall()">

❌

</button>

</div>

</div>

<!-- ===== SIDE PANEL ===== -->

<div class="sidePanel">

<!-- ===== SMS ===== -->

<div class="card">

<h2>
📩 SMS History
</h2>

<div id="smsHistory">

<div class="message">
No SMS Sent Yet
</div>

</div>

</div>

<!-- ===== COMPLAINTS ===== -->

<div class="card">

<h2>
🎤 Complaint Recordings
</h2>

<div id="complaints">

<div class="message">
No Complaint Yet
</div>

</div>

</div>

</div>

<!-- ===== SCRIPT ===== -->

<script src="app.js"></script>

</body>

</html>
