<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rythu Mitra IVR</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- ===== PHONE ===== -->

<div class="phone">

<!-- ===== TOP BAR ===== -->

<div class="topBar">

<div>
📶 BSNL Mobile
</div>

<div id="timer">
00:00
</div>

</div>

<!-- ===== SCREEN ===== -->

<div id="screen">

<div id="screenText">

📞 Ready To Call

</div>

<div id="wave"></div>

</div>

<!-- ===== KEYPAD ===== -->

<div class="keypad">

<button onclick="pressKey('1')">1</button>
<button onclick="pressKey('2')">2</button>
<button onclick="pressKey('3')">3</button>

<button onclick="pressKey('4')">4</button>
<button onclick="pressKey('5')">5</button>
<button onclick="pressKey('6')">6</button>

<button onclick="pressKey('7')">7</button>
<button onclick="pressKey('8')">8</button>
<button onclick="pressKey('9')">9</button>

<button>*</button>
<button onclick="pressKey('0')">0</button>
<button>#</button>

</div>

<!-- ===== CALL BUTTONS ===== -->

<div class="callButtons">

<button class="callBtn"
onclick="startCall()">

📞

</button>

<button class="endBtn"
onclick="endCall()">

❌

</button>

</div>

</div>

<!-- ===== RIGHT PANEL ===== -->

<div class="sidePanel">

<!-- ===== SMS HISTORY ===== -->

<div id="smsBox"
class="card">

<h2>
📩 SMS History
</h2>

<div id="smsHistory">

<div class="message">
No SMS Sent Yet
</div>

</div>

</div>

<!-- ===== COMPLAINTS ===== -->

<div class="card">

<h2>
🎤 Complaint Recordings
</h2>

<div id="complaints">

<div class="message">
No Complaint Yet
</div>

</div>

</div>

</div>

<!-- ===== SCRIPT ===== -->

<script src="app.js"></script>

</body>

</html>
