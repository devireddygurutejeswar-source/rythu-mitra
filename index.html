<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rythu Mitra</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(
135deg,
#02140b,
#0f172a
);

padding:15px;

display:flex;

flex-direction:column;

align-items:center;

color:white;
}

/* ===== TITLE ===== */

.logo{

font-size:38px;

font-weight:bold;

color:#4ade80;

margin-bottom:8px;
}

.tag{

font-size:16px;

margin-bottom:18px;
}

/* ===== PHONE ===== */

.phone{

width:280px;

background:#111827;

padding:15px;

border-radius:30px;

border:4px solid #1e293b;

box-shadow:
0 0 25px rgba(0,0,0,0.8);
}

/* ===== SPEAKER ===== */

.speaker{

width:70px;
height:10px;

background:black;

border-radius:20px;

margin:auto;

margin-bottom:12px;
}

/* ===== SCREEN ===== */

.screen{

height:360px;

background:
linear-gradient(
135deg,
#7dd3fc,
#a7f3d0
);

border-radius:12px;

padding:12px;

border:4px solid #64748b;

overflow-y:auto;

color:#082f49;
}

.network{

font-size:12px;

font-weight:bold;
}

.call-number{

font-size:15px;

font-weight:bold;

margin-top:10px;

text-align:center;

color:white;
}

#timer{

font-size:20px;

font-weight:bold;

margin-top:8px;

text-align:center;

color:white;
}

#screenText{

font-size:14px;

line-height:1.6;

margin-top:18px;

font-weight:bold;

white-space:pre-line;

text-align:center;
}

#solution{

margin-top:15px;

font-size:16px;

font-weight:bold;

text-align:center;

color:#166534;
}

/* ===== WAVES ===== */

#waves{

display:flex;

justify-content:center;

align-items:flex-end;

gap:4px;

height:40px;

margin-top:15px;
}

.bar{

width:6px;

height:8px;

background:#16a34a;

border-radius:20px;
}

.active .bar{

animation:wave 0.8s infinite;
}

.active .bar:nth-child(2){

animation-delay:0.1s;
}

.active .bar:nth-child(3){

animation-delay:0.2s;
}

.active .bar:nth-child(4){

animation-delay:0.3s;
}

.active .bar:nth-child(5){

animation-delay:0.4s;
}

@keyframes wave{

0%{
height:8px;
}

50%{
height:35px;
}

100%{
height:8px;
}

}

/* ===== NAV ===== */

.nav{

display:flex;

justify-content:center;

align-items:center;

gap:10px;

margin-top:15px;
}

.nav-btn{

width:45px;
height:35px;

background:#334155;

border-radius:12px;
}

.center-btn{

width:55px;
height:55px;

border-radius:18px;

background:#0f172a;

border:4px solid #94a3b8;
}

/* ===== KEYPAD ===== */

.keypad{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:8px;

margin-top:18px;
}

.key{

height:48px;

border:none;

border-radius:12px;

background:#0f172a;

color:white;

font-size:22px;

font-weight:bold;

cursor:pointer;
}

.call{

background:#22c55e;
}

/* ===== DASHBOARD ===== */

.dashboard{

width:95%;

max-width:850px;

margin-top:25px;

display:flex;

flex-direction:column;

gap:18px;
}

.section{

background:white;

color:black;

padding:16px;

border-radius:18px;
}

.section h2{

color:#166534;

margin-bottom:12px;

font-size:20px;
}

.message{

background:#ecfccb;

padding:12px;

border-radius:12px;

margin-top:10px;
}

.time{

font-size:11px;

margin-top:6px;

color:#475569;
}

/* ===== SCORES ===== */

.score-item{

margin-top:14px;
}

.score-title{

font-weight:bold;

margin-bottom:5px;
}

.score-bg{

height:24px;

background:#cbd5e1;

border-radius:18px;

overflow:hidden;
}

.score-fill{

height:100%;

background:
linear-gradient(
90deg,
#22c55e,
#15803d
);

display:flex;

align-items:center;

justify-content:flex-end;

padding-right:8px;

color:white;

font-size:12px;

font-weight:bold;
}

</style>

</head>

<body>

<div class="logo">
🌾 Rythu Mitra
</div>

<div class="tag">
IVR Smart Farming Assistant
</div>

<div class="phone">

<div class="speaker"></div>

<div class="screen">

<div class="network">
📶 BSNL Mobile
</div>

<div class="call-number">
+91 9894399789
</div>

<div id="timer">
00:00
</div>

<div id="screenText">

Press Call Button

</div>

<div id="solution"></div>

<div id="waves">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

</div>

<!-- NAV -->

<div class="nav">

<div class="nav-btn"></div>

<div class="center-btn"></div>

<div class="nav-btn"></div>

</div>

<!-- KEYPAD -->

<div class="keypad">

<button class="key"
onclick="pressKey(1)">
1
</button>

<button class="key"
onclick="pressKey(2)">
2
</button>

<button class="key"
onclick="pressKey(3)">
3
</button>

<button class="key"
onclick="pressKey(4)">
4
</button>

<button class="key"
onclick="pressKey(5)">
5
</button>

<button class="key"
onclick="pressKey(6)">
6
</button>

<button class="key"
onclick="pressKey(7)">
7
</button>

<button class="key"
onclick="pressKey(8)">
8
</button>

<button class="key"
onclick="pressKey(9)">
9
</button>

<button class="key">
*
</button>

<button class="key call"
onclick="startCall()">
📞
</button>

<button class="key">
#
</button>

</div>

</div>

<!-- DASHBOARD -->

<div class="dashboard">

<div id="smsBox" class="section">

<h2>📩 SMS History</h2>

</div>

<div id="history" class="section">

<h2>🎤 Complaint History</h2>

</div>

<div id="scoreBoard" class="section">

<h2>📊 Smart Learning Scores</h2>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
